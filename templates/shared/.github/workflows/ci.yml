name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - if: ${{ '{{RUNTIME}}' == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: bun install
      - run: bun lint
      - run: bun test

